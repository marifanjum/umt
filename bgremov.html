<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/index.js"></script>
    <style>
        .checkerboard {
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), 
                              linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #e5e7eb 75%), 
                              linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl p-6 md:p-10">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">✨ AI Background Remover</h1>
            <p class="text-gray-500 mt-3 text-lg">Create transparent PNGs instantly. Private & Secure.</p>
        </header>

        <div id="drop-zone" class="border-4 border-dashed border-indigo-100 rounded-2xl p-16 text-center hover:border-indigo-300 hover:bg-indigo-50 transition-all cursor-pointer group">
            <input type="file" id="file-input" accept="image/*" class="hidden">
            <div id="upload-prompt">
                <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <p class="text-xl font-semibold text-gray-700">Click or Drag & Drop Image</p>
                <p class="text-sm text-gray-400 mt-2">High-res PNG, JPG, or WEBP</p>
            </div>
        </div>

        <div id="loading-state" class="hidden mt-10 text-center py-10">
            <div class="inline-block animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600 mb-6"></div>
            <p class="text-indigo-700 font-bold text-xl">AI is analyzing your image...</p>
            <p class="text-gray-400 text-sm mt-2 italic">The first run takes a moment to load AI models.</p>
        </div>

        <div id="result-container" class="hidden mt-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <p class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest text-center">Before</p>
                    <img id="original-preview" class="w-full h-auto rounded-xl shadow-md border border-gray-100">
                </div>
                <div>
                    <p class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest text-center">After</p>
                    <div class="checkerboard rounded-xl border border-gray-200 shadow-inner overflow-hidden">
                        <img id="result-preview" class="w-full h-auto block">
                    </div>
                    
                    <div class="space-y-3 mt-6">
                        <button id="download-btn" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                            Save to Computer
                        </button>
                        
                        <button id="send-to-app-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-200">
                            🚀 Send to Card Generator
                        </button>
                    </div>
                </div>
            </div>
            
            <button id="reset-btn" class="mt-10 mx-auto block text-indigo-500 hover:text-indigo-700 font-medium transition-colors">
                ← Process another image
            </button>
        </div>
    </div>

    <footer class="mt-8 text-gray-400 text-sm">
        Processing powered by <a href="https://img.ly" class="underline">img.ly</a>. No data is sent to any server.
    </footer>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const loadingState = document.getElementById('loading-state');
        const resultContainer = document.getElementById('result-container');
        const originalPreview = document.getElementById('original-preview');
        const resultPreview = document.getElementById('result-preview');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        const sendBtn = document.getElementById('send-to-app-btn');

        // Broadcast Channel setup
        const bc = new BroadcastChannel('social_card_transfer');
        let resultBlob = null;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-indigo-50'); };
        dropZone.ondragleave = () => dropZone.classList.remove('bg-indigo-50');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-indigo-50');
            handleFile(e.dataTransfer.files[0]);
        };

        async function handleFile(file) {
            if (!file || !file.type.startsWith('image/')) return;

            dropZone.classList.add('hidden');
            loadingState.classList.remove('hidden');
            originalPreview.src = URL.createObjectURL(file);

            try {
                // Background removal logic
                const blob = await imglyRemoveBackground(file, { model: 'medium' });
                resultBlob = blob;
                resultPreview.src = URL.createObjectURL(blob);

                loadingState.classList.add('hidden');
                resultContainer.classList.remove('hidden');
            } catch (error) {
                console.error(error);
                alert("AI failed to process. Try a simpler image.");
                resetApp();
            }
        }

        downloadBtn.onclick = () => {
            if (!resultBlob) return;
            const link = document.createElement('a');
            link.href = URL.createObjectURL(resultBlob);
            link.download = `no-bg-${Date.now()}.png`;
            link.click();
        };

        sendBtn.onclick = () => {
            if (!resultBlob) return;
            const reader = new FileReader();
            reader.readAsDataURL(resultBlob);
            reader.onloadend = () => {
                bc.postMessage({ type: 'ADD_IMAGE', imageSrc: reader.result });
                
                // Visual feedback
                const originalText = sendBtn.innerText;
                sendBtn.innerText = "✅ Sent to Generator!";
                sendBtn.classList.replace('bg-indigo-600', 'bg-green-600');
                
                setTimeout(() => {
                    sendBtn.innerText = originalText;
                    sendBtn.classList.replace('bg-green-600', 'bg-indigo-600');
                }, 3000);
            };
        };

        resetBtn.onclick = resetApp;

        function resetApp() {
            fileInput.value = "";
            dropZone.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            loadingState.classList.add('hidden');
        }
    </script>
</body>
</html>
